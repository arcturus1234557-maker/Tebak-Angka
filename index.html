<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎯 Tebak Angka</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      padding-top: 50px;
      color: #333;
    }

    .container {
      background: #ffffff;
      padding: 25px;
      border-radius: 15px;
      width: 320px;
      margin: auto;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(-20px);}
      to {opacity: 1; transform: translateY(0);}
    }

    h1 {
      color: #2a5298;
    }

    p {
      color: #444;
    }

    select, input {
      padding: 10px;
      width: 80%;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      background: #f9f9f9;
      color: #333;
    }

    button {
      padding: 10px;
      margin-top: 10px;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      background: #2ecc71;
      color: white;
      font-weight: bold;
      transition: 0.3s;
    }

    button:hover {
      background: #27ae60;
      transform: scale(1.05);
    }

    button:active {
      transform: scale(0.95);
    }

    #hasil {
      font-weight: bold;
      margin-top: 15px;
      font-size: 16px;
      transition: 0.3s;
    }

    #skor, #timer, #percobaan {
      color: #222;
      font-weight: bold;
    }

    .bounce {
      animation: bounce 0.4s;
    }

    .shake {
      animation: shake 0.3s;
    }

    @keyframes bounce {
      0% {transform: scale(1);}
      50% {transform: scale(1.2);}
      100% {transform: scale(1);}
    }

    @keyframes shake {
      0% {transform: translateX(0);}
      25% {transform: translateX(-5px);}
      50% {transform: translateX(5px);}
      75% {transform: translateX(-5px);}
      100% {transform: translateX(0);}
    }
  </style>
</head>

<body>

<div class="container">
  <h1>🎯 Tebak Angka</h1>

  <p>Pilih Level:</p>
  <select id="level">
    <option value="50">Easy (1-50)</option>
    <option value="100" selected>Medium (1-100)</option>
    <option value="500">Hard (1-500)</option>
  </select>

  <p id="info">Tebak angka dari 1 - 100</p>

  <button onclick="mulaiGame()">▶ Mulai Game</button>

  <br>

  <input type="number" id="inputAngka" placeholder="Masukkan angka" disabled>
  <br>

  <button onclick="tebak()">Tebak</button>
  <button onclick="resetGame()">Reset</button>

  <p id="hasil">Klik mulai dulu!</p>
  <p id="percobaan"></p>
  <p id="skor">Skor: 0</p>
  <p id="timer">Waktu: 0</p>
</div>

<!-- SOUND -->
<audio id="startSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>
<audio id="winSound" src="https://www.soundjay.com/buttons/sounds/button-4.mp3"></audio>
<audio id="loseSound" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>

<script>
let maxAngka = 100;
let angkaRahasia;
let percobaan = 0;
let maxPercobaan = 5;
let skor = 0;
let waktu = 0;
let timerInterval;
let gameAktif = false;

document.getElementById("level").addEventListener("change", function() {
  maxAngka = parseInt(this.value);
  document.getElementById("info").innerText = "Tebak angka dari 1 - " + maxAngka;
  resetGame();
});

function mulaiGame() {
  angkaRahasia = Math.floor(Math.random() * maxAngka) + 1;
  percobaan = 0;
  waktu = 30;
  gameAktif = true;

  document.getElementById("startSound").play();

  let hasil = document.getElementById("hasil");
  hasil.innerText = "Game dimulai!";
  hasil.style.color = "#2a5298";

  document.getElementById("inputAngka").disabled = false;
  document.getElementById("inputAngka").value = "";
  document.getElementById("timer").innerText = "Waktu: " + waktu;

  clearInterval(timerInterval);
  timerInterval = setInterval(function() {
    waktu--;
    document.getElementById("timer").innerText = "Waktu: " + waktu;

    if (waktu <= 0) {
      hasil.innerText = "⏰ Waktu habis! Angka: " + angkaRahasia;
      hasil.style.color = "red";
      hasil.classList.add("shake");

      document.getElementById("loseSound").play();
      document.getElementById("inputAngka").disabled = true;
      gameAktif = false;
      clearInterval(timerInterval);
    }
  }, 1000);
}

function tebak() {
  if (!gameAktif) return;

  let input = document.getElementById("inputAngka").value;
  let hasil = document.getElementById("hasil");

  if (!input) return;

  percobaan++;

  hasil.classList.remove("bounce", "shake");

  if (input == angkaRahasia) {
    hasil.innerText = "🎉 Benar! Kamu menang!";
    hasil.style.color = "green";
    hasil.classList.add("bounce");

    skor += 10;
    document.getElementById("skor").innerText = "Skor: " + skor;

    document.getElementById("winSound").play();
    document.getElementById("inputAngka").disabled = true;
    gameAktif = false;
    clearInterval(timerInterval);
  } 
  else if (percobaan >= maxPercobaan) {
    hasil.innerText = "❌ Kalah! Angka: " + angkaRahasia;
    hasil.style.color = "red";
    hasil.classList.add("shake");

    document.getElementById("loseSound").play();
    document.getElementById("inputAngka").disabled = true;
    gameAktif = false;
    clearInterval(timerInterval);
  } 
  else if (input < angkaRahasia) {
    hasil.innerText = "Terlalu kecil!";
    hasil.style.color = "#e67e22";
    hasil.classList.add("shake");
  } 
  else {
    hasil.innerText = "Terlalu besar!";
    hasil.style.color = "#e67e22";
    hasil.classList.add("shake");
  }

  document.getElementById("percobaan").innerText =
    "Percobaan: " + percobaan + "/" + maxPercobaan;
}

function resetGame() {
  clearInterval(timerInterval);
  gameAktif = false;

  let hasil = document.getElementById("hasil");
  hasil.innerText = "Klik mulai dulu!";
  hasil.style.color = "#333";
  hasil.classList.remove("bounce", "shake");

  document.getElementById("inputAngka").disabled = true;
  document.getElementById("inputAngka").value = "";
  document.getElementById("percobaan").innerText = "";
  document.getElementById("timer").innerText = "Waktu: 0";
}
</script>

</body>
</html>
